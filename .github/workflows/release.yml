name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - release_arch: x64
            runner: windows-latest
            python_architecture: x64
          - release_arch: x86
            runner: windows-latest
            python_architecture: x86
          - release_arch: arm64
            runner: windows-11-arm
            python_architecture: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_architecture }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $releaseVersion = "${env:GITHUB_REF_NAME}".TrimStart('v')
          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build release assets
        shell: pwsh
        run: .\scripts\build-release.ps1 -Version '${{ steps.version.outputs.release_version }}' -TargetArchitecture '${{ matrix.release_arch }}'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioBlue-release-${{ matrix.release_arch }}
          path: |
            dist/release/AudioBlue-Setup-${{ matrix.release_arch }}.exe
            dist/release/AudioBlue-Setup-With-WebView2-${{ matrix.release_arch }}.exe

  publish-release:
    needs: build-release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: AudioBlue-release-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate release changelog
        shell: pwsh
        run: .\scripts\generate-release-notes.ps1 -TagName '${{ github.ref_name }}' -OutputPath "$env:GITHUB_WORKSPACE\release-notes.md"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ github.workspace }}/release-notes.md
          generate_release_notes: true
          files: |
            release-artifacts/AudioBlue-Setup-x64.exe
            release-artifacts/AudioBlue-Setup-With-WebView2-x64.exe
            release-artifacts/AudioBlue-Setup-x86.exe
            release-artifacts/AudioBlue-Setup-With-WebView2-x86.exe
            release-artifacts/AudioBlue-Setup-arm64.exe
            release-artifacts/AudioBlue-Setup-With-WebView2-arm64.exe
