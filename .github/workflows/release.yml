name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $releaseVersion = "${env:GITHUB_REF_NAME}".TrimStart('v')
          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build release assets
        shell: pwsh
        run: .\scripts\build-release.ps1 -Version '${{ steps.version.outputs.release_version }}'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioBlue-release
          path: |
            dist/release/AudioBlue-Setup.exe
            dist/release/SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/release/AudioBlue-Setup.exe
            dist/release/SHA256SUMS.txt
